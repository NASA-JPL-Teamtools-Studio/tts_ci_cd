name: PR Multi-Version Tests

on:
  workflow_call:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  test:
    name: Py ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.6", "3.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    
    env:
      SETUPTOOLS_SCM_PRETEND_VERSION: "1.0.0.dev0"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- 1. MODERN PYTHON HANDLING (3.8 to 3.14) ----
      - name: Setup Modern Python
        if: matrix.python-version != '3.6' && matrix.python-version != '3.7'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Test Modern Python
        if: matrix.python-version != '3.6' && matrix.python-version != '3.7'
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pytest pytest-html setuptools-scm
          pip install .
          pytest --html=report-${{ matrix.python-version }}.html --self-contained-html

      # ---- 2. LEGACY PYTHON HANDLING (3.6 and 3.7) ----
      - name: Test Legacy Python in Docker
        if: matrix.python-version == '3.6' || matrix.python-version == '3.7'
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/app" \
            -w /app \
            -e SETUPTOOLS_SCM_PRETEND_VERSION="1.0.0.dev0" \
            python:${{ matrix.python-version }}-slim \
            bash -c "
              apt-get update && apt-get install -y git && \
              git config --global --add safe.directory /app && \
              if [ '${{ matrix.python-version }}' = '3.6' ]; then
                pip install --upgrade 'pip<21.0' 'setuptools<60.0' wheel && \
                pip install 'pytest<7.0' 'pytest-html<3.0' 'setuptools-scm<7.0';
              else
                pip install --upgrade 'pip<23.1' 'setuptools<60.0' wheel && \
                pip install 'pytest<8.0' 'pytest-html<4.0' 'setuptools-scm<8.0';
              fi && \
              pip install . && \
              pytest --html=report-${{ matrix.python-version }}.html --self-contained-html
            "
          sudo chown -R $USER:$USER "$GITHUB_WORKSPACE"

      # ---- 3. UPLOAD REPORT ----
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-py${{ matrix.python-version }}
          path: report-${{ matrix.python-version }}.html

      # ---- 4. SAVE STATUS FOR PR COMMENT ----
      - name: Save Job Status
        if: always()
        run: |
          # Write the version and job status to a text file
          echo "${{ matrix.python-version }}|${{ job.status }}" > status-${{ matrix.python-version }}.txt

      - name: Upload Job Status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-py${{ matrix.python-version }}
          path: status-${{ matrix.python-version }}.txt
          retention-days: 1

  # ---- 5. AGGREGATE RESULTS & POST COMMENT ----
  comment:
    name: Post PR Comment
    needs: test
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download Status Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: status-py*
          merge-multiple: true

      - name: Generate Markdown Table
        run: |
          echo "### 🧪 Python Multi-Version Test Results" > pr_message.md
          echo "" >> pr_message.md
          echo "| Python Version | Status | Evidence |" >> pr_message.md
          echo "|---|---|---|" >> pr_message.md

          # Sort the status files so the table is in version order (e.g., 3.9 before 3.10)
          for file in $(ls status-*.txt | sort -V); do
            IFS='|' read -r version status < "$file"
            if [ "$status" = "success" ]; then
              icon="✅ Passed"
            else
              icon="❌ Failed"
            fi
            echo "| **$version** | $icon | Check **Summary** tab for \`test-report-py$version\` |" >> pr_message.md
          done

          echo "" >> pr_message.md
          echo "- [View Full Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> pr_message.md

      - name: Post Status Comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: pr_message.md