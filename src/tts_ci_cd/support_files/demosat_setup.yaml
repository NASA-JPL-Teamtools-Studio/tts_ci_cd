# support_files/dev_setup.yaml

# (Optional) You can define the default host here if you use something other than GitHub
# git_host: "github.com" 

# (Optional) You can define default extra index URLs for pip installations
# extra_index_urls:
#   - "https://pypi.internal.company.com/simple"
#   - "https://pypi.org/simple"

# This file defines repositories specific to the DemoSat project
# It references repositories from the base manifest (dev_setup.yaml)

demosat:
  demosat_dict:
    repo_path: "NASA-JPL-TTS-Demosat/demosat_dict"
    branch: "main"
    dependencies: []

  demosat_seqdb:
    repo_path: "NASA-JPL-TTS-Demosat/demosat_seqdb"
    branch: "main"
    dependencies: []

  demosat_dictionary_interface:
    repo_path: "NASA-JPL-TTS-Demosat/demosat_dictionary_interface"
    branch: "main"
    dependencies:
      - tts_dictionary_interface
      - demosat_dict

  demosat_plan:
    repo_path: "NASA-JPL-TTS-Demosat/demosat_plan"
    branch: "main"
    dependencies:
      - tts_plan

  demosat_seq:
    repo_path: "NASA-JPL-TTS-Demosat/demosat_seq"
    branch: "main"
    dependencies:
      - tts_seq
      - demosat_seqdb
      - demosat_dictionary_interface

  demosat_fresh:
    repo_path: "NASA-JPL-TTS-Demosat/demosat_fresh"
    branch: "main"
    dependencies:
      - tts_fresh
      - demosat_seq
    
  demosat_data_utils:
    repo_path: "NASA-JPL-TTS-Demosat/demosat_data_utils"
    branch: "main"
    dependencies:
      - tts_data_utils

  demosat_tower:
    repo_path: "NASA-JPL-TTS-Demosat/demosat_tower"
    branch: "main"
    dependencies:
      - tts_tower
      - demosat_fresh
      - demosat_data_utils

  demosat_dante:
    repo_path: "NASA-JPL-TTS-Demosat/demosat_dante"
    branch: "main"
    dependencies:
      - tts_dante
      - demosat_data_utils

  demosat_dexter:
    repo_path: "NASA-JPL-TTS-Demosat/demosat_dexter"
    branch: "main"
    dependencies:
      - tts_dexter
      - demosat_data_utils

