# (Optional) You can define default extra index URLs for pip installations
# extra_index_urls:
#   - "https://pypi.internal.company.com/simple"
#   - "https://pypi.org/simple"

tts_core:
  tts_utilities:
    repo_path: "NASA-JPL-Teamtools-Studio/tts_utilities"
    branch: "main"
    dependencies: []

  tts_html_utils:
    repo_path: "NASA-JPL-Teamtools-Studio/tts_html_utils"
    branch: "main"
    dependencies:
      - tts_utilities

  tts_dictionary_interface:
    repo_path: "NASA-JPL-Teamtools-Studio/tts_dictionary_interface"
    branch: "main"
    dependencies:
      - tts_utilities

  tts_spice:
    repo_path: "NASA-JPL-Teamtools-Studio/tts_spice"
    branch: "main"
    dependencies:
      - tts_utilities
      
  tts_dtat:
    repo_path: "NASA-JPL-Teamtools-Studio/tts_dtat"
    branch: "main"
    dependencies:
      - tts_utilities

  tts_papertrail:
    repo_path: "NASA-JPL-Teamtools-Studio/tts_papertrail"
    branch: "main"
    dependencies:
      - tts_html_utils

  tts_plan:
    repo_path: "NASA-JPL-Teamtools-Studio/tts_plan"
    branch: "main"
    dependencies:
      - tts_dictionary_interface
      - tts_spice

  tts_seq:
    repo_path: "NASA-JPL-Teamtools-Studio/tts_seq"
    branch: "main"
    dependencies:
      - tts_dictionary_interface
      - tts_dtat
      - tts_spice
      
  tts_fresh:
    repo_path: "NASA-JPL-Teamtools-Studio/tts_fresh"
    branch: "main"
    dependencies:
      - tts_seq
            
  tts_tower:
    repo_path: "NASA-JPL-Teamtools-Studio/tts_tower"
    branch: "main"
    dependencies:
      - tts_papertrail

  tts_data_utils:
    repo_path: "NASA-JPL-Teamtools-Studio/tts_data_utils"
    branch: "main"
    dependencies:
      - tts_papertrail

  tts_dante:
    repo_path: "NASA-JPL-Teamtools-Studio/tts_dante"
    branch: "main"
    dependencies:
      - tts_data_utils

  tts_dexter:
    repo_path: "NASA-JPL-Teamtools-Studio/tts_dexter"
    branch: "main"
    dependencies:
      - tts_data_utils
